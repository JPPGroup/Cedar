# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- master

jobs:
- job: Build
  strategy:
    matrix:     
      2018:
        poolFlag: 2018
  continueOnError: true
  timeoutInMinutes: 10
  pool:
    name: Autodesk
    demands: Revit  -equals $(poolFlag)
  steps:
  - task: VSBuild@1
    inputs:
      solution: '**\*.sln'
      clean: true
      restoreNugetPackages: true
      msbuildArchitecture: 'x64'