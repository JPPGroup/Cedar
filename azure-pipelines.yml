# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- master

jobs:
- job: LaunchBuildVM
  strategy:
    matrix:
      2021:
        vmName: 'Revit_2021'      
      2017:
        vmName: 'Revit_2017'  
  timeoutInMinutes: 10
  pool:
    name: Autodesk
    demands: hypervisor
  steps:
  - task: PowerShell@2
    inputs:
      targetType: 'inline'
      script: |
        Start-Vm -Name $(vmName)
        $VM = Get-VM -Name $(vmName)
        while ($VM.State -ne 'Running')
        {
            $VM = Get-VM -Name $(vmName)
            Start-Sleep -s 15
        }
      
        write-host "The VM is on"


- job: StopBuildVM
  dependsOn: LaunchBuildVM
  timeoutInMinutes: 10
  pool:
    name: Autodesk
    demands: hypervisor
  steps:
  - task: PowerShell@2
    inputs:
      targetType: 'inline'
      script: |
        Stop-Vm -Name $(vmName) -TurnOff
        Restore-VMSnapshot -Name 'Base' -VMName $(vmName)  -Confirm:$false